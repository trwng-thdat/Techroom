<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Techroom | My Classes</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <div
        id="sidebar-container"
        data-active="my-classes"
        data-home-href="index.html"
        data-classes-href="index.html"
        data-assignments-href="#"
        data-absence-href="#"
        data-schedule-href="#"
        data-profile-href="#"
        data-settings-href="#"
      ></div>

      <main class="content" id="page-top">
        <div
          id="header-container"
          data-back-href="#page-top"
          data-profile-name="Maya Sterling"
          data-profile-role="Student"
          data-avatar="MS"
          data-avatar-color="#f39b54"
        ></div>

        <section class="page-heading" aria-labelledby="my-classes-title">
          <div>
            <h1 id="my-classes-title">My Classes</h1>
          </div>
        </section>

        <form class="filters-panel" id="classFilters" novalidate>
          <label class="search-box" for="classSearch">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="m21 21-4.3-4.3" />
              <path d="M10.8 18a7.2 7.2 0 1 0 0-14.4 7.2 7.2 0 0 0 0 14.4Z" />
            </svg>
            <input
              id="classSearch"
              type="search"
              placeholder="Search your classes..."
              autocomplete="off"
            />
          </label>

          <div class="filter-selects" aria-label="Class filters">
            <label class="select-field" for="subjectFilter">
              <span>Subject</span>
              <select id="subjectFilter"></select>
            </label>

            <label class="select-field" for="levelFilter">
              <span>Level</span>
              <select id="levelFilter"></select>
            </label>

            <label class="select-field" for="dayFilter">
              <span>Day</span>
              <select id="dayFilter"></select>
            </label>
          </div>
        </form>

        <section
          class="class-grid"
          id="classGrid"
          aria-label="Enrolled classes"
        ></section>

        <section class="empty-state" id="emptyState" hidden>
          <div class="empty-illustration" aria-hidden="true">
            <svg viewBox="0 0 24 24">
              <path d="M3 17l5.5-5.5 4 4L19 9" />
              <path d="M14 9h5v5" />
              <path d="M5 20h14" />
              <path d="M9.5 8.5a3.5 3.5 0 1 0 0-7 3.5 3.5 0 0 0 0 7Z" />
            </svg>
          </div>
          <h2>No classes found</h2>
          <p>
            We couldn't find any classes matching your current filters. Try
            adjusting them to see more results.
          </p>
          <button class="secondary-button" type="button" id="clearFilters">
            Clear filters
          </button>
        </section>
      </main>
    </div>

    <script src="sidebar.js"></script>
    <script src="header.js"></script>
    <script src="data.js"></script>
    <script src="script.js"></script>
  </body>
</html>
