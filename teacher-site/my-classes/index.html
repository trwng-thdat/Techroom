<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Classes | Teacher</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <div
        id="sidebar-container"
        data-active="my-class"
        data-home-href="../index.html"
        data-my-class-href="index.html"
        data-schedule-href="../timetable/index.html"
      ></div>

      <main class="content">
        <div id="header-container" data-back-href="../index.html"></div>

        <section class="page-heading" aria-labelledby="my-classes-title">
          <div>
            <h1 id="my-classes-title">My Classes</h1>
            <p>
              Manage your active learning ateliers and monitor student
              engagement across your current roster.
            </p>
          </div>
        </section>

        <form class="search-panel" id="classSearch">
          <label class="search-box" for="searchClasses">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="m21 21-4.3-4.3" />
              <path d="M10.8 18a7.2 7.2 0 1 0 0-14.4 7.2 7.2 0 0 0 0 14.4Z" />
            </svg>
            <input
              id="searchClasses"
              type="search"
              placeholder="Search your classes by name or code..."
              autocomplete="off"
            />
          </label>
        </form>

        <section class="class-list" aria-label="Current classes">
          <article
            class="class-card"
            data-name="Advanced Mathematics Grade 10 MATH-10A"
          >
            <div class="subject-icon math" aria-hidden="true">
              <svg viewBox="0 0 24 24">
                <path d="M7 5h10M7 19h10M8 5l7 7-7 7" />
              </svg>
            </div>
            <div class="class-main">
              <p class="class-code">MATH-10A</p>
              <h2>Advanced Mathematics &mdash; Grade 10</h2>
              <div class="class-meta">
                <span>
                  <svg viewBox="0 0 24 24">
                    <path d="M12 7v5l3 2" />
                    <path d="M12 22a10 10 0 1 0 0-20 10 10 0 0 0 0 20Z" />
                  </svg>
                  Tue &amp; Thu · 4:30 - 6:00 PM
                </span>
                <span>
                  <svg viewBox="0 0 24 24">
                    <path d="M5 21V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v16" />
                    <path d="M9 21v-6h6v6" />
                  </svg>
                  Room 301
                </span>
              </div>
            </div>
            <div class="attendance">
              <p>ATTENDANCE</p>
              <div class="meter"><span style="width: 92%"></span></div>
              <strong>92% Average</strong>
            </div>
            <button
              class="open-class"
              type="button"
              aria-label="Open Advanced Mathematics"
            >
              <svg viewBox="0 0 24 24"><path d="m9 18 6-6-6-6" /></svg>
            </button>
          </article>
        </section>
      </main>
    </div>

    <script src="../sidebar.js"></script>
    <script src="../header.js"></script>
    <script src="script.js"></script>
  </body>
</html>
