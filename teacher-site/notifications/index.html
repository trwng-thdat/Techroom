<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Notifications | Teacher</title>
    <meta name="description" content="Teacher notifications — room changes, upcoming sessions, and student submission alerts." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <div
        id="sidebar-container"
        data-active="notifications"
        data-home-href="../index.html"
        data-my-class-href="../my-classes/index.html"
        data-schedule-href="../timetable/index.html"
      ></div>

      <main class="content">
        <div id="header-container" data-back-href="../my-classes/index.html"></div>

        <!-- Page heading -->
        <div class="page-heading">
          <div class="heading-left">
            <h1>Notifications</h1>
            <span class="unread-badge" id="unreadBadge" aria-live="polite"></span>
          </div>
          <button class="mark-all-btn" id="markAllBtn" type="button">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m5 12 5 5L20 7"/></svg>
            Mark all as read
          </button>
        </div>

        <!-- Filter bar -->
        <div class="filter-bar" role="tablist" aria-label="Filter notifications">
          <button class="filter-btn active" role="tab" aria-selected="true" data-filter="all" id="filterAll">All</button>
          <button class="filter-btn" role="tab" aria-selected="false" data-filter="unread" id="filterUnread">Unread</button>
          <button class="filter-btn" role="tab" aria-selected="false" data-filter="room-change" id="filterRoom">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2Z"/><path d="M9 22V12h6v10"/></svg>
            Room Changes
          </button>
          <button class="filter-btn" role="tab" aria-selected="false" data-filter="schedule" id="filterSchedule">
            <svg viewBox="0 0 24 24" aria-hidden="true"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
            Schedule
          </button>
          <button class="filter-btn" role="tab" aria-selected="false" data-filter="submission" id="filterSubmission">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8Z"/><path d="M14 2v6h6M9 13l2 2 4-4"/></svg>
            Submissions
          </button>
        </div>

        <!-- Notification list -->
        <div class="notif-list" id="notifList" role="list" aria-label="Notifications"></div>

        <!-- Empty state -->
        <div class="empty-state hidden" id="emptyState" role="status">
          <div class="empty-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24"><path d="M18 8a6 6 0 1 0-12 0c0 7-3 7-3 9h18c0-2-3-2-3-9"/><path d="M13.7 21a2 2 0 0 1-3.4 0"/></svg>
          </div>
          <p class="empty-title">You're all caught up</p>
          <p class="empty-sub">No notifications match this filter.</p>
        </div>
      </main>
    </div>

    <script src="../sidebar.js"></script>
    <script src="../header.js"></script>
    <script src="../data.js"></script>
    <script src="script.js"></script>
  </body>
</html>
