<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Class Schedule | Teacher</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <div
        id="sidebar-container"
        data-active="my-class"
        data-home-href="../index.html"
        data-my-class-href="../my-classes/index.html"
        data-schedule-href="../timetable/index.html"
      ></div>

      <main class="content">
        <div id="header-container" data-back-href="../my-classes/index.html"></div>

        <section class="class-header" aria-labelledby="class-title">
          <h1 id="class-title">Advanced Mathematics &mdash; Grade 10</h1>
          <div class="class-meta">
            <span>
              <svg viewBox="0 0 24 24"><path d="M12 3 3 8l9 5 9-5-9-5Z" /><path d="m3 16 9 5 9-5" /><path d="m3 12 9 5 9-5" /></svg>
              MATH-10A
            </span>
            <span>Room 301</span>
            <span>Tue &amp; Thu</span>
          </div>
        </section>

        <nav class="tabs" aria-label="Class sections">
          <a href="../class-management/index.html">Student</a>
          <a href="../materials/index.html">Material</a>
          <a href="../assignments/index.html">Assignment</a>
          <a class="active" href="index.html" aria-current="page">Schedule</a>
        </nav>

        <section class="schedule-panel" aria-label="Class schedule">
          <div class="schedule-table" role="table" aria-label="Scheduled sessions">
            <div class="table-head" role="row">
              <span role="columnheader">DATE &amp; DAY</span>
              <span role="columnheader">TIME</span>
              <span role="columnheader">STATUS</span>
              <span role="columnheader">ACTION</span>
            </div>
            <div id="sessionList"></div>
          </div>
        </section>

        <footer class="schedule-footer">
          <p id="sessionCount">Showing 4 of 28 scheduled sessions</p>
          <div class="pagination" aria-label="Pagination">
            <button type="button" aria-label="Previous page">
              <svg viewBox="0 0 24 24"><path d="m15 18-6-6 6-6" /></svg>
            </button>
            <button type="button" aria-label="Next page">
              <svg viewBox="0 0 24 24"><path d="m9 18 6-6-6-6" /></svg>
            </button>
          </div>
        </footer>
      </main>
    </div>

    <script src="../sidebar.js"></script>
    <script src="../header.js"></script>
    <script src="../modal.js"></script>
    <script src="script.js"></script>
  </body>
</html>
