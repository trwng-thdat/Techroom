<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Class Schedule | Teacher</title>
    <meta name="description" content="View and manage scheduled class sessions for attendance." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <div
        id="sidebar-container"
        data-active="my-class"
        data-home-href="../index.html"
        data-my-class-href="../my-classes/index.html"
        data-schedule-href="../timetable/index.html"
      ></div>

      <main class="content">
        <div id="header-container" data-back-href="../my-classes/index.html"></div>

        <!-- Class header -->
        <section class="class-header" aria-labelledby="class-title">
          <h1 id="class-title">Advanced Mathematics &mdash; Grade 10</h1>
          <div class="class-meta">
            <span>
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 3 3 8l9 5 9-5-9-5Z"/><path d="m3 16 9 5 9-5"/><path d="m3 12 9 5 9-5"/></svg>
              MATH-10A
            </span>
            <span>
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2Z"/><path d="M9 22V12h6v10"/></svg>
              Room 301
            </span>
            <span>
              <svg viewBox="0 0 24 24" aria-hidden="true"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
              Tue &amp; Thu
            </span>
          </div>
        </section>

        <!-- Tabs -->
        <nav class="tabs" aria-label="Class sections">
          <a href="../class-management/index.html">Student</a>
          <a href="../materials/index.html">Material</a>
          <a href="../assignments/index.html">Assignment</a>
          <a class="active" href="index.html" aria-current="page">Schedule</a>
        </nav>

        <!-- Schedule table -->
        <section class="schedule-panel" aria-label="Class schedule">
          <div class="schedule-table" role="table" aria-label="Scheduled sessions">
            <div class="table-head" role="row">
              <span role="columnheader">DATE &amp; DAY</span>
              <span role="columnheader">TIME</span>
              <span role="columnheader">STATUS</span>
              <span role="columnheader">ACTION</span>
            </div>
            <div id="sessionList"></div>
          </div>

          <!-- Footer with count + pagination -->
          <footer class="schedule-footer">
            <p id="sessionCount" class="session-count-text"></p>
            <div class="pagination" aria-label="Session pagination">
              <button class="page-btn" type="button" id="prevPage" aria-label="Previous page">
                <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m15 18-6-6 6-6"/></svg>
              </button>
              <button class="page-btn" type="button" id="nextPage" aria-label="Next page">
                <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m9 18 6-6-6-6"/></svg>
              </button>
            </div>
          </footer>
        </section>
      </main>
    </div>

    <script src="../sidebar.js"></script>
    <script src="../header.js"></script>
    <script src="../data.js"></script>
    <script src="../modal.js"></script>
    <script src="script.js"></script>
  </body>
</html>
